<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Pierre Moreau">
  <defs>
    <radialGradient id="tile" cx="30%" cy="20%" r="95%">
      <stop offset="0" stop-color="#1a2233"/>
      <stop offset="0.62" stop-color="#0c0f16"/>
      <stop offset="1" stop-color="#080a0e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="52%" r="50%">
      <stop offset="0" stop-color="#5b7cff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#5b7cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- tile -->
  <rect width="64" height="64" rx="15" fill="url(#tile)"/>
  <rect x="1" y="1" width="62" height="62" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.4"/>

  <!-- inner glow -->
  <circle cx="31" cy="33" r="20" fill="url(#glow)"/>

  <!-- monogram -->
  <text x="31.5" y="47.5" text-anchor="middle"
        font-family="'Space Grotesk','Segoe UI',system-ui,-apple-system,Roboto,'Helvetica Neue',Arial,sans-serif"
        font-weight="700" font-size="45" letter-spacing="-1.5" fill="#aec0ff">P</text>

  <!-- brand accent dot -->
  <circle cx="45.5" cy="17.5" r="4" fill="#5b7cff"/>
  <circle cx="45.5" cy="17.5" r="4" fill="none" stroke="#5b7cff" stroke-opacity="0.5" stroke-width="3"/>
</svg>
